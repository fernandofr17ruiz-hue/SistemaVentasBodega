<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial Ventas | Bodega PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand text-uppercase fw-bold" href="index.html">Sistema de Ventas</a>
            <div class="navbar-nav ms-auto align-items-center">
                <a class="btn btn-outline-secondary btn-sm me-2 text-white border-0" href="inventario.html">Inventario</a>
                <a class="btn btn-outline-secondary btn-sm me-2 text-white border-0" href="proveedores.html">Proveedores</a>
                <a class="btn btn-secondary btn-sm me-2 text-white border-0 fw-bold" href="facturacion.html">Facturación</a>
                <a class="btn btn-outline-light btn-sm me-3 rounded-0" href="sistema.html" target="_blank">Caja POS ⧉</a>
                <button class="btn btn-danger btn-sm rounded-0 fw-bold" onclick="cerrarSesion()">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-5 pb-5">
        <h3 class="text-dark text-uppercase fw-bold mb-4 border-bottom border-2 border-dark pb-2">Historial de Transacciones</h3>

        <div class="panel-sistema shadow-sm">
            <div class="cabecera-panel bg-primary">REGISTRO HISTÓRICO DE VENTAS POS</div>
            <table class="table table-bordered table-striped table-hover m-0">
                <thead class="table-dark text-center">
                    <tr>
                        <th>Cód. Transacción</th>
                        <th>Fecha y Hora</th>
                        <th>Operador (Caja)</th>
                        <th>Total (S/)</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-facturas">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="modalTicket" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-0 border-dark">
                <div class="modal-header bg-dark text-white rounded-0">
                    <h5 class="modal-title fw-bold">Detalle de Venta</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bg-light" id="modalDetalleCuerpo">
                    </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js?v=14"></script>
    <script>
        // Protección de Ruta (Solo Administrador)
        if (localStorage.getItem('rol') !== 'administrador') window.location.href = 'sistema.html';
    </script>
</body>
</html>
