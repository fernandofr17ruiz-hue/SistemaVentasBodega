<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Gerencial | Bodega PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand text-uppercase fw-bold" href="index.html">Sistema de Ventas - Bodega</a>
            <div class="d-flex">
                <a class="btn btn-outline-light" href="inventario.html">Volver al Inventario</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-5 pb-5">
        <h3 class="mb-4 text-dark text-uppercase fw-bold border-bottom border-2 border-dark pb-2">Panel Gerencial (Dashboard)</h3>
        
        <div class="row mb-4 g-4">
            <div class="col-md-3">
                <div class="kpi-box border-start border-4 border-primary">
                    <span class="text-uppercase text-muted d-block" style="font-size: 0.8rem; font-weight: 800;">Ítems en Almacén</span>
                    <h2 class="m-0 text-dark fw-bold" id="kpi-productos">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="kpi-box border-start border-4 border-danger">
                    <span class="text-uppercase text-muted d-block" style="font-size: 0.8rem; font-weight: 800;">Alertas de Stock</span>
                    <h2 class="m-0 text-danger fw-bold" id="kpi-critico">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="kpi-box border-start border-4 border-success">
                    <span class="text-uppercase text-muted d-block" style="font-size: 0.8rem; font-weight: 800;">Tickets Emitidos</span>
                    <h2 class="m-0 text-dark fw-bold" id="kpi-ventas-tx">0</h2>
                </div>
            </div>
            <div class="col-md-3">
                <div class="kpi-box border-start border-4 border-success bg-success bg-opacity-10">
                    <span class="text-uppercase text-success d-block" style="font-size: 0.8rem; font-weight: 800;">Ingresos Totales</span>
                    <h2 class="m-0 text-success fw-bold" id="kpi-ventas-dinero">S/ 0.00</h2>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-7">
                <div class="panel-sistema h-100">
                    <!-- TÍTULO ACTUALIZADO -->
                    <div class="cabecera-panel bg-dark">INGRESOS POR PRODUCTO (MÁS VENDIDOS)</div>
                    <div class="p-4">
                        <canvas id="graficaBarras"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-lg-5">
                <div class="panel-sistema h-100">
                    <div class="cabecera-panel bg-dark">DISTRIBUCIÓN DE FAMILIAS</div>
                    <div class="p-4 text-center d-flex align-items-center justify-content-center h-100">
                        <canvas id="graficaTorta" style="max-height: 280px; width: 100%;"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js?v=19"></script>
    <script>
        if (localStorage.getItem('rol') !== 'administrador') window.location.href = 'sistema.html';
    </script>
</body>
</html>
