<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso al Sistema | Bodega PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh; background-color: #e9ecef;">
    
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-lg border-0 rounded-3">
                    <div class="card-header bg-dark text-white text-center py-4 rounded-top">
                        <h3 class="fw-bold mb-0">BODEGA PRO</h3>
                        <small class="text-white-50">MÓDULO DE AUTENTICACIÓN</small>
                    </div>
                    
                    <div class="card-body p-4 p-md-5 bg-white">
                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary small text-uppercase">ID de Usuario</label>
                            <input type="text" id="user" class="form-control form-control-lg bg-light border-secondary" placeholder="Ingrese su usuario" autocomplete="off">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold text-secondary small text-uppercase">Contraseña</label>
                            <input type="password" id="pass" class="form-control form-control-lg bg-light border-secondary" placeholder="Ingrese su clave" onkeydown="if(event.key === 'Enter') login()">
                        </div>
                        
                        <button class="btn btn-danger btn-lg w-100 fw-bold mb-3 shadow-sm rounded-1" onclick="login()">INGRESAR AL SISTEMA</button>
                        
                        <div class="text-center">
                            <a href="index.html" class="text-decoration-none text-muted small">← Retornar al Inicio</a>
                        </div>
                    </div>
                    
                    <div class="card-footer bg-light text-center py-3 border-top-0 rounded-bottom">
                        <small class="text-muted d-block mb-1">Credenciales por defecto:</small>
                        <small class="text-dark fw-bold d-block">Admin: admin / 123</small>
                        <small class="text-dark fw-bold d-block">Cajero: cajero / 123</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js?v=20"></script>
</body>
</html>
