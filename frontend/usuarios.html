<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Módulo de Usuarios | Bodega PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand text-uppercase fw-bold" href="index.html">Sistema de Ventas - Bodega</a>
            
            <div class="navbar-nav ms-auto align-items-center">
                <a class="btn btn-outline-secondary btn-sm me-2 text-white border-0" href="inventario.html">Inventario</a>
                <a class="btn btn-outline-secondary btn-sm me-2 text-white border-0" href="proveedores.html">Proveedores</a>
                <a class="btn btn-outline-secondary btn-sm me-2 text-white border-0" href="facturacion.html">Facturación</a>
                <a class="btn btn-secondary btn-sm me-2 text-white border-0 fw-bold" href="usuarios.html">Usuarios</a>
                <a class="btn btn-outline-light btn-sm me-3 rounded-0" href="sistema.html" target="_blank">Módulo de Caja ⧉</a>
                <button class="btn btn-danger btn-sm rounded-0 fw-bold" onclick="cerrarSesion()">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-5 pb-5">
        <h3 class="text-dark text-uppercase fw-bold mb-4 border-bottom border-2 border-dark pb-2">Gestión de Accesos y Usuarios</h3>

        <div class="panel-sistema mb-4 shadow-sm">
            <div class="cabecera-panel bg-primary">REGISTRAR NUEVO EMPLEADO</div>
            <div class="p-3 bg-light">
                <div class="row g-2">
                    <div class="col-md-3"><input type="text" id="usrNombre" class="form-control rounded-0 border-secondary" placeholder="Nombre Completo (Ej. Juan Pérez)"></div>
                    <div class="col-md-3"><input type="text" id="usrUser" class="form-control rounded-0 border-secondary" placeholder="Username (Ej. jperez)"></div>
                    <div class="col-md-3"><input type="text" id="usrPass" class="form-control rounded-0 border-secondary" placeholder="Contraseña"></div>
                    <div class="col-md-3">
                        <select id="usrRol" class="form-select rounded-0 border-secondary">
                            <option value="cajero">Cajero POS</option>
                            <option value="administrador">Administrador General</option>
                        </select>
                    </div>
                    <div class="col-md-12 mt-3 text-end">
                        <button class="btn btn-primary fw-bold px-5 rounded-0" onclick="guardarNuevoUsuario()">CREAR USUARIO</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="panel-sistema shadow-sm">
            <div class="cabecera-panel bg-dark">PERSONAL AUTORIZADO EN EL SISTEMA</div>
            <table class="table table-bordered table-striped table-hover m-0">
                <thead class="table-dark text-center align-middle">
                    <tr>
                        <th>ID</th>
                        <th>Nombre del Empleado</th>
                        <th>Username (Login)</th>
                        <th>Rol de Sistema</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-usuarios">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="script.js?v=21"></script>
    <script>
        if (localStorage.getItem('rol') !== 'administrador') window.location.href = 'sistema.html';
    </script>
</body>
</html>
