<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Módulo de Proveedores | Bodega PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand text-uppercase fw-bold" href="index.html">Sistema de Ventas - Bodega</a>
            
            <div class="navbar-nav ms-auto align-items-center">
                <a class="btn btn-outline-secondary btn-sm me-2 text-white border-0" href="inventario.html">Inventario</a>
                <a class="btn btn-secondary btn-sm me-2 text-white border-0 fw-bold" href="proveedores.html">Proveedores</a>
                <a class="btn btn-outline-secondary btn-sm me-2 text-white border-0" href="facturacion.html">Facturación</a>
                <a class="btn btn-outline-light btn-sm me-3 rounded-0" href="sistema.html" target="_blank">Módulo de Caja ⧉</a>
                <button class="btn btn-danger btn-sm rounded-0 fw-bold" onclick="cerrarSesion()">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-5 pb-5">
        <h3 class="text-dark text-uppercase fw-bold mb-4 border-bottom border-2 border-dark pb-2">Directorio de Proveedores</h3>

        <div class="panel-sistema mb-4 shadow-sm">
            <div class="cabecera-panel bg-dark">REGISTRAR NUEVO PROVEEDOR</div>
            <div class="p-3 bg-light">
                <div class="row g-2">
                    <div class="col-md-2"><input type="text" id="provRuc" class="form-control rounded-0 border-secondary" placeholder="RUC"></div>
                    <div class="col-md-4"><input type="text" id="provEmpresa" class="form-control rounded-0 border-secondary" placeholder="Razón Social / Empresa"></div>
                    <div class="col-md-3"><input type="text" id="provRep" class="form-control rounded-0 border-secondary" placeholder="Representante (Nombre)"></div>
                    <div class="col-md-3"><input type="text" id="provTel" class="form-control rounded-0 border-secondary" placeholder="Teléfono / Celular"></div>
                    <div class="col-md-12 mt-3 text-end">
                        <button class="btn btn-dark fw-bold px-5 rounded-0" onclick="guardarNuevoProveedor()">GUARDAR PROVEEDOR</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="panel-sistema shadow-sm">
            <div class="cabecera-panel bg-secondary">LISTADO DE PROVEEDORES ACTIVOS</div>
            <table class="table table-bordered table-striped table-hover m-0">
                <thead class="table-dark text-center align-middle">
                    <tr>
                        <th>RUC</th>
                        <th>Empresa Proveedora</th>
                        <th>Representante</th>
                        <th>Teléfono</th>
                        <th>Acción</th> 
                    </tr>
                </thead>
                <tbody id="tabla-proveedores">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="script.js?v=14"></script>
    <script>
        // Protección de Ruta (Solo Administrador)
        if (localStorage.getItem('rol') !== 'administrador') window.location.href = 'sistema.html';
    </script>
</body>
</html>
