<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda Virtual | Bodega PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        .card-producto { transition: transform 0.2s, box-shadow 0.2s; }
        .card-producto:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }
        .btn-flotante-carrito { position: fixed; bottom: 30px; right: 30px; z-index: 1000; border-radius: 50%; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .badge-carrito { position: absolute; top: 0; right: 0; transform: translate(25%, -25%); font-size: 0.9rem; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-shop me-2"></i>BODEGA PRO
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuTienda">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menuTienda">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link text-white" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link text-white fw-bold active" href="tienda.html">Catálogo Virtual</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <a href="login.html" class="btn btn-outline-light btn-sm rounded-0 me-3">Acceso Empleados</a>
                    <button class="btn btn-danger fw-bold rounded-0 position-relative" type="button" data-bs-toggle="offcanvas" data-bs-target="#carritoLateral">
                        <i class="bi bi-cart3"></i> Mi Pedido
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-warning text-dark" id="contador-carrito">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="bg-primary text-white text-center py-5 mb-5 shadow-sm" style="background: linear-gradient(135deg, #212529 0%, #343a40 100%);">
        <div class="container">
            <h1 class="display-5 fw-bold mb-3">Catálogo de Productos</h1>
            <p class="lead mb-0">Haz tu pedido en línea y recíbelo por delivery o recógelo en tienda.</p>
        </div>
    </div>

    <div class="container pb-5">
        <div class="row g-4">
            
            <div class="col-lg-3">
                <div class="card border-0 shadow-sm rounded-3 sticky-top" style="top: 100px;">
                    <div class="card-header bg-dark text-white fw-bold text-uppercase py-3">
                        <i class="bi bi-funnel me-2"></i>Categorías
                    </div>
                    <ul class="list-group list-group-flush" id="lista-categorias">
                        <button class="list-group-item list-group-item-action active fw-bold" onclick="filtrarTienda('Todas', this)">Mostrar Todos</button>
                        </ul>
                </div>
            </div>

            <div class="col-lg-9">
                <div class="row g-4" id="contenedor-productos">
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-2 text-muted">Cargando catálogo desde el servidor...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="offcanvas offcanvas-end shadow" tabindex="-1" id="carritoLateral">
        <div class="offcanvas-header bg-dark text-white">
            <h5 class="offcanvas-title fw-bold"><i class="bi bi-cart-check me-2"></i>Mi Pedido</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            
            <div id="items-carrito" class="flex-grow-1 overflow-auto">
                <div class="text-center text-muted mt-5">
                    <i class="bi bi-cart-x display-1 opacity-25"></i>
                    <p class="mt-3">Tu carrito está vacío.</p>
                </div>
            </div>
            
            <div class="border-top pt-3 mt-3">
                <div class="d-flex justify-content-between mb-3">
                    <span class="fw-bold text-secondary text-uppercase">Total a Pagar:</span>
                    <h3 class="fw-bold text-success m-0" id="total-carrito">S/ 0.00</h3>
                </div>
                <button class="btn btn-success btn-lg w-100 fw-bold rounded-1" onclick="enviarPedidoWhatsApp()">
                    <i class="bi bi-whatsapp me-2"></i>PEDIR POR WHATSAPP
                </button>
            </div>
        </div>
    </div>

    <button class="btn btn-danger btn-flotante-carrito d-lg-none" data-bs-toggle="offcanvas" data-bs-target="#carritoLateral">
        <i class="bi bi-cart3"></i>
        <span class="badge bg-warning text-dark badge-carrito" id="contador-movil">0</span>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const API_TIENDA = 'http://localhost:3000/api/productos';
        let catalogo = [];
        let carrito = [];

        document.addEventListener('DOMContentLoaded', cargarCatalogo);

        // 1. DESCARGAR PRODUCTOS DE LA BASE DE DATOS
        async function cargarCatalogo() {
            try {
                const response = await fetch(API_TIENDA);
                const data = await response.json();
                // Filtramos solo los productos que tengan stock físico (> 0)
                catalogo = data.filter(p => p.stock > 0); 
                extraerCategorias();
                renderizarProductos(catalogo);
            } catch (error) {
                document.getElementById('contenedor-productos').innerHTML = `<div class="alert alert-danger w-100 text-center">Error al conectar con la base de datos de la Bodega.</div>`;
            }
        }

        // 2. CREAR MENÚ DE CATEGORÍAS
        function extraerCategorias() {
            const lista = document.getElementById('lista-categorias');
            const cats = [...new Set(catalogo.map(item => item.categoria || 'Abarrotes'))];
            
            cats.forEach(cat => {
                lista.innerHTML += `<button class="list-group-item list-group-item-action text-uppercase" onclick="filtrarTienda('${cat}', this)">${cat}</button>`;
            });
        }

        function filtrarTienda(categoria, boton) {
            // Estilos del menú
            document.querySelectorAll('#lista-categorias button').forEach(btn => btn.classList.remove('active', 'fw-bold'));
            boton.classList.add('active', 'fw-bold');

            // Filtrado
            const filtrados = categoria === 'Todas' ? catalogo : catalogo.filter(i => (i.categoria || 'Abarrotes') === categoria);
            renderizarProductos(filtrados);
        }

        // 3. DIBUJAR LOS PRODUCTOS EN PANTALLA
        function renderizarProductos(lista) {
            const contenedor = document.getElementById('contenedor-productos');
            contenedor.innerHTML = '';

            if(lista.length === 0) {
                contenedor.innerHTML = '<div class="text-center text-muted py-5">No hay productos disponibles en esta categoría.</div>';
                return;
            }

            lista.forEach(p => {
                contenedor.innerHTML += `
                    <div class="col-md-6 col-lg-4">
                        <div class="card h-100 border-0 shadow-sm card-producto">
                            <img src="${p.img || 'https://images.unsplash.com/photo-1542838132-92c53300491e?w=300'}" class="card-img-top" style="height: 200px; object-fit: cover;" alt="${p.nombre}">
                            <div class="card-body d-flex flex-column">
                                <span class="badge bg-secondary mb-2 align-self-start text-uppercase">${p.categoria || 'Abarrotes'}</span>
                                <h5 class="card-title fw-bold text-dark">${p.nombre}</h5>
                                <h4 class="text-success fw-bold mt-auto mb-3">S/ ${parseFloat(p.precio).toFixed(2)}</h4>
                                <button class="btn btn-dark w-100 rounded-1 fw-bold" onclick="agregarAlCarrito(${p.id}, '${p.nombre}', ${p.precio})">
                                    <i class="bi bi-cart-plus me-2"></i>Agregar
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // 4. LÓGICA DEL CARRITO DE COMPRAS
        function agregarAlCarrito(id, nombre, precio) {
            const itemExistente = carrito.find(i => i.id === id);
            if (itemExistente) {
                itemExistente.cantidad++;
            } else {
                carrito.push({ id, nombre, precio: parseFloat(precio), cantidad: 1 });
            }
            actualizarInterfazCarrito();
        }

        function modificarCantidad(id, cambio) {
            const item = carrito.find(i => i.id === id);
            if (item) {
                item.cantidad += cambio;
                if (item.cantidad <= 0) carrito = carrito.filter(i => i.id !== id);
                actualizarInterfazCarrito();
            }
        }

        function actualizarInterfazCarrito() {
            const panel = document.getElementById('items-carrito');
            const contadores = [document.getElementById('contador-carrito'), document.getElementById('contador-movil')];
            const totalUI = document.getElementById('total-carrito');

            if (carrito.length === 0) {
                panel.innerHTML = `<div class="text-center text-muted mt-5"><i class="bi bi-cart-x display-1 opacity-25"></i><p class="mt-3">Tu carrito está vacío.</p></div>`;
                contadores.forEach(c => c.innerText = '0');
                totalUI.innerText = 'S/ 0.00';
                return;
            }

            panel.innerHTML = '';
            let total = 0;
            let cantidadTotal = 0;

            carrito.forEach(item => {
                const subtotal = item.precio * item.cantidad;
                total += subtotal;
                cantidadTotal += item.cantidad;

                panel.innerHTML += `
                    <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-2">
                        <div>
                            <h6 class="m-0 fw-bold">${item.nombre}</h6>
                            <small class="text-muted">S/ ${item.precio.toFixed(2)} x ${item.cantidad}</small>
                        </div>
                        <div class="d-flex align-items-center">
                            <button class="btn btn-sm btn-outline-secondary px-2 py-0" onclick="modificarCantidad(${item.id}, -1)">-</button>
                            <span class="mx-2 fw-bold">${item.cantidad}</span>
                            <button class="btn btn-sm btn-outline-secondary px-2 py-0" onclick="modificarCantidad(${item.id}, 1)">+</button>
                        </div>
                    </div>
                `;
            });

            contadores.forEach(c => c.innerText = cantidadTotal);
            totalUI.innerText = `S/ ${total.toFixed(2)}`;
        }

        // 5. FINALIZAR COMPRA POR WHATSAPP
        function enviarPedidoWhatsApp() {
            if (carrito.length === 0) return alert("Agrega productos al carrito primero.");
            
            let mensaje = "*NUEVO PEDIDO - BODEGA PRO*%0A%0A";
            let total = 0;

            carrito.forEach(item => {
                const subtotal = item.precio * item.cantidad;
                total += subtotal;
                mensaje += `- ${item.cantidad}x ${item.nombre} (S/ ${subtotal.toFixed(2)})%0A`;
            });

            mensaje += `%0A*TOTAL A PAGAR: S/ ${total.toFixed(2)}*%0A%0A`;
            mensaje += "Por favor, confirmar mi pedido y método de pago.";

            // Reemplaza este número por el celular real de tu bodega (Ej: 51999888777)
            const numeroBodega = "51999999999"; 
            const urlWhatsApp = `https://wa.me/${numeroBodega}?text=${mensaje}`;
            
            window.open(urlWhatsApp, '_blank');
        }
    </script>
</body>
</html>
